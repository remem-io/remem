name: Smoke tests

on:
  push:
    branches: [main]
    paths:
      - "rememhq-core/**"
      - "rememhq-api/**"
      - "rememhq-cli/**"
      - "rememhq-mcp/**"
      - "libremem/**"
      - "Cargo.toml"
      - ".github/workflows/smoke.yml"
  pull_request:
    branches: [main]
    paths:
      - "rememhq-core/**"
      - "rememhq-api/**"
      - "rememhq-cli/**"
      - "rememhq-mcp/**"
      - "libremem/**"
      - "Cargo.toml"
      - ".github/workflows/smoke.yml"

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke
      - name: Build all binaries
        run: cargo build --release -p rememhq-cli -p rememhq-api -p rememhq-mcp
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: smoke-binaries
          path: |
            target/release/remem
            target/release/rememhq-api
            target/release/rememhq-mcp
          retention-days: 1

  cli:
    name: CLI smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: smoke-binaries
      - name: Verify CLI
        run: |
          chmod +x remem
          ./remem --help
          echo "✅ CLI binary runs"

  api:
    name: API smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: smoke-binaries
      - name: Verify API
        run: |
          chmod +x rememhq-api
          timeout 5 ./rememhq-api --help || true
          echo "✅ API binary runs"

  mcp:
    name: MCP smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: smoke-binaries
      - name: Verify MCP
        run: |
          chmod +x rememhq-mcp
          timeout 5 ./rememhq-mcp --help || true
          echo "✅ MCP binary runs"

  smoke-pass:
    name: Smoke pass
    if: always()
    needs: [cli, api, mcp]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate
        run: |
          if [[ "${{ needs.cli.result }}" == "failure" || \
                "${{ needs.api.result }}" == "failure" || \
                "${{ needs.mcp.result }}" == "failure" ]]; then
            echo "❌ Smoke tests failed"
            exit 1
          fi
          echo "✅ All smoke tests passed"
