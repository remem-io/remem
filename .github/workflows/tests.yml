name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rust_only:
        description: "Run Rust tests only"
        type: boolean
        default: false

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: Unit tests
        run: cargo test --workspace --lib
      - name: Integration tests
        run: cargo test --workspace --test '*'
        continue-on-error: true
      - name: Doc tests
        run: cargo test --workspace --doc

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  python-tests:
    name: Python tests (${{ matrix.python-version }})
    if: ${{ !inputs.rust_only }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: sdk/python
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: sdk/python
        run: |
          pip install ruff
          ruff check .
        continue-on-error: true
      - name: Test
        working-directory: sdk/python
        run: pytest tests/ -v --tb=short

  typescript-tests:
    name: TypeScript tests
    if: ${{ !inputs.rust_only }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: sdk/typescript
        run: npm install
      - name: Type check
        working-directory: sdk/typescript
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Build
        working-directory: sdk/typescript
        run: npm run build

  tests-pass:
    name: All tests pass
    if: always()
    needs: [rust-tests, coverage, python-tests, typescript-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.rust-tests.result }}" == "failure" ]]; then
            echo "❌ Rust tests failed"
            exit 1
          fi
          if [[ "${{ needs.python-tests.result }}" == "failure" ]]; then
            echo "❌ Python tests failed"
            exit 1
          fi
          if [[ "${{ needs.typescript-tests.result }}" == "failure" ]]; then
            echo "❌ TypeScript tests failed"
            exit 1
          fi
          echo "✅ All required tests passed"
