plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'io.remem.expo'
version = '0.1.0'

android {
  namespace "io.remem.expo"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }
}
